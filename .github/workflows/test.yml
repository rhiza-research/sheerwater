name: Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for hatch-vcs

    - name: Auth to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        token_format: 'access_token'
        workload_identity_provider: "projects/730596460290/locations/global/workloadIdentityPools/rhiza-github/providers/rhiza-github"
        service_account: "rhiza-github-action@rhiza-shared.iam.gserviceaccount.com"
        export_environment_variables: true

    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Cache nuthatch data
      uses: actions/cache@v4
      with:
        path: ~/.cache/nuthatch
        key: nuthatch-${{ runner.os }}
        restore-keys: |
          nuthatch-

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --all-groups --all-extras

    - name: Run tests
      run: |
        mkdir -p coverage
        uv run pytest \
          -v \
          --junitxml=coverage/junit.xml \
          --cov-report=xml:coverage/coverage.xml \
          --cov-report=term

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: coverage/junit.xml
        reporter: java-junit
        fail-on-error: false

    # - name: Upload coverage to Codecov
    #   uses: codecov/codecov-action@v4
    #   if: always()
    #   with:
    #     file: ./coverage/coverage.xml
    #     flags: unittests
    #     name: codecov-ubuntu
    #     fail_ci_if_error: false

    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          coverage/junit.xml
          coverage/coverage.xml
        retention-days: 30
