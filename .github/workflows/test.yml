name: Tests

on:
  workflow_dispatch:  # Manual trigger only - tests require setup not yet in CI
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for hatch-vcs

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --all-groups --all-extras

    - name: Run tests
      run: |
        mkdir -p coverage
        uv run pytest \
          -v \
          --junitxml=coverage/junit.xml \
          --cov-report=xml:coverage/coverage.xml \
          --cov-report=term

    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: coverage/junit.xml
        reporter: java-junit
        fail-on-error: false

    # - name: Upload coverage to Codecov
    #   uses: codecov/codecov-action@v4
    #   if: always()
    #   with:
    #     file: ./coverage/coverage.xml
    #     flags: unittests
    #     name: codecov-ubuntu
    #     fail_ci_if_error: false

    - name: Upload test artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          coverage/junit.xml
          coverage/coverage.xml
        retention-days: 30
